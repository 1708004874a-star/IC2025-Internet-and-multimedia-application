<!doctype html>
<HTML>
    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-wEmeIV1mKuiNpC+IOBjI7aAzPcEZeedi5yW5f2yOq55WWLwNGmvvx4Um1vskeMj0" crossorigin="anonymous">
        <title>TM1118 Checkpoint2</title>
    </head>
    <body>
        <h1 class="display-3 p-3 mb-2 bg-danger text-white">Sensors' data</h1>
        <table>
            <thread>
                <tr>
                    <th>node_id</th>
                    <th>loc</th>
                    <th>temp</th>
                    <th>hum</th>
                    <th>light</th>
                    <th>snd</th>
                    <th>date_created</th>
                </tr>
            </thread>
            <tbody>
                {% for sensor in sensors %}
                <tr>
                    <td>{{ sensor.node_id }}</td>
                    <td>{{ sensor.loc }}</td>
                    <td>{{ sensor.temp }}</td>
                    <td>{{ sensor.hum }}</td>
                    <td>{{ sensor.light }}</td>
                    <td>{{ sensor.snd }}</td>
                    <td>{{ sensor.date_created }}</td>
                </tr>
            </tbody>
        </table>
        <div>
        {% endfor %}
    </body>
</HTML>
