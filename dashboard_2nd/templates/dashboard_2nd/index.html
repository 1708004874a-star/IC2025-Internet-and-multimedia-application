<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>IC2140 IoT Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Flexmonster -->
    <link rel="stylesheet" type="text/css" href="https://cdn.flexmonster.com/theme/white/flexmonster.min.css"/>

    <style>
        :root {
            --primary-color: #dc3545;
            --secondary-color: #ff7675;
            --card-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            --chart-height: 380px;
        }

        body {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            padding-bottom: 2rem;
        }

        .dashboard-title {
            background: linear-gradient(90deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: #fff;
            border-radius: 0.75rem;
            box-shadow: 0 6px 18px rgba(220, 53, 69, 0.25);
            margin-top: 1rem;
            position: relative;
            overflow: hidden;
        }

        .dashboard-title::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.08'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }

        .dashboard-card {
            background: #fff;
            border-radius: 0.75rem;
            box-shadow: var(--card-shadow);
            padding: 1.75rem;
            margin-bottom: 2.5rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: none;
        }

        .dashboard-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .card-header {
            display: flex;
            align-items: center;
            border-bottom: 2px solid rgba(0, 0, 0, 0.05);
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
        }

        .card-icon {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-size: 1.25rem;
        }

        .card-title {
            font-weight: 600;
            font-size: 1.3rem;
            margin: 0;
        }

        .temp-icon {
            background: rgba(220, 53, 69, 0.15);
            color: #dc3545;
        }

        .hum-icon {
            background: rgba(25, 135, 84, 0.15);
            color: #198754;
        }

        .light-icon {
            background: rgba(255, 193, 7, 0.15);
            color: #ffc107;
        }

        .sound-icon {
            background: rgba(13, 110, 253, 0.15);
            color: #0d6efd;
        }

        .filter-section {
            background: #fff;
            border-radius: 0.75rem;
            box-shadow: var(--card-shadow);
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .form-select,
        .form-control {
            min-width: 180px;
            border-radius: 0.5rem;
            border: 1px solid #dee2e6;
            padding: 0.65rem 1rem;
            font-size: 0.95rem;
        }

        .form-label {
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: #495057;
        }

        .btn-primary {
            background: linear-gradient(90deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            border: none;
            border-radius: 0.5rem;
            padding: 0.75rem 1.5rem;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(220, 53, 69, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(220, 53, 69, 0.4);
        }

        .flexmonster-container {
            min-height: var(--chart-height);
            border-radius: 0.5rem;
            overflow: hidden;
            background: #f8f9fa;
            border: 1px solid #e9ecef;
        }

        #location-selector.form-select[multiple] {
            height: 190px;
        }

        @media (max-width: 768px) {
            .dashboard-card {
                padding: 1.25rem;
            }

            .card-title {
                font-size: 1.15rem;
            }

            .flexmonster-container {
                min-height: 300px;
            }
        }
    </style>
</head>

<body>
<div class="container py-4">
    <div class="row mb-4">
        <div class="col-12">
            <h1 class="dashboard-title display-4 text-center py-4 mb-0 shadow-sm">
                <i class="bi bi-cpu me-3"></i>IoT Sensor Dashboard
            </h1>
        </div>
    </div>

    <div class="filter-section">
        <div class="row align-items-end">
            <div class="col-lg-4 mb-3">
                <label for="location-selector" class="form-label">Select Location(s):</label>
                <select id="location-selector" class="form-select" multiple size="8">
                    <option value="all" selected>All Locations</option>
                    <option value="W502g">W502g</option>
                    <option value="w311">W311</option>
                    <option value="W311A">W311A</option>
                    <option value="W311B">W311B</option>
                    <option value="W311-H1">W311-H1</option>
                    <option value="W311-H2">W311-H2</option>
                    <option value="W311-H3">W311-H3</option>
                    <option value="W311D-Z1">W311D-Z1</option>
                    <option value="W311D-Z2">W311D-Z2</option>
                </select>
            </div>

            <div class="col-lg-6 mb-3">
                <div class="row g-2">
                    <div class="col-md-6">
                        <label for="start-time" class="form-label">Start Time:</label>
                        <input type="datetime-local" id="start-time" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label for="end-time" class="form-label">End Time:</label>
                        <input type="datetime-local" id="end-time" class="form-control">
                    </div>
                </div>
            </div>

            <div class="col-lg-2 mb-3 d-grid">
                <button id="apply-time-filter" class="btn btn-primary mt-md-0 mt-2">
                    <i class="bi bi-funnel me-1"></i> Apply Filter
                </button>
            </div>
        </div>
    </div>

    <div class="dashboard-card">
        <div class="card-header">
            <div class="card-icon temp-icon">
                <i class="bi bi-thermometer-half"></i>
            </div>
            <h5 class="card-title">Temperature</h5>
        </div>
        <div id="pivot-container" class="flexmonster-container"></div>
    </div>

    <div class="dashboard-card">
        <div class="card-header">
            <div class="card-icon hum-icon">
                <i class="bi bi-droplet"></i>
            </div>
            <h5 class="card-title">Humidity</h5>
        </div>
        <div id="pivot-container1" class="flexmonster-container"></div>
    </div>

    <div class="dashboard-card">
        <div class="card-header">
            <div class="card-icon light-icon">
                <i class="bi bi-brightness-high"></i>
            </div>
            <h5 class="card-title">Light</h5>
        </div>
        <div id="pivot-container2" class="flexmonster-container"></div>
    </div>

    <div class="dashboard-card">
        <div class="card-header">
            <div class="card-icon sound-icon">
                <i class="bi bi-volume-up"></i>
            </div>
            <h5 class="card-title">Sound</h5>
        </div>
        <div id="pivot-container3" class="flexmonster-container"></div>
    </div>

    <div class="footer text-center text-muted">
        IC2140 IoT Dashboard &copy; 2023 | Real-time Sensor Monitoring System
    </div>
</div>


<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
<script src="https://cdn.flexmonster.com/flexmonster.js"></script>
<script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>

<script>

    const locationColorMap = {
        "W502g": "#4169E1",
        "w311": "#DC143C",
        "W311A": "#2E8B57",
        "W311B": "#FFFF00",
        "W311-H1": "#FF8C00",
        "W311-H2": "#8A2BE2",
        "W311-H3": "#00FFFF",
        "W311D-Z1": "#1E90FF",
        "W311D-Z2": "#20B2AA"
    };

    function processData(dataset, selectedLocations, timeRange) {
        let result = [];
        dataset = JSON.parse(dataset);

        if (!Array.isArray(selectedLocations)) {
            selectedLocations = [selectedLocations];
        }

        dataset.forEach(item => {
            const location = item.fields.loc || item.fields.node_loc;
            if (!location) return;

            const itemTime = new Date(item.fields.date_created).getTime();

            const locationMatch = selectedLocations.includes("all") ||
                                  selectedLocations.includes(location);
            const timeMatch = !timeRange ||
                              (itemTime >= timeRange.start && itemTime <= timeRange.end);

            if (locationMatch && timeMatch) {
                result.push({
                    node_id: item.fields.node_id,
                    loc: location,
                    temp: item.fields.temp,
                    hum: item.fields.hum,
                    light: item.fields.light,
                    snd: item.fields.snd,
                    date_created: item.fields.date_created
                });
            }
        });
        return result;
    }
</script>

<script>
    $(document).ready(function () {

        window.flexmonster1 = null;
        window.flexmonster2 = null;
        window.flexmonster3 = null;
        window.flexmonster4 = null;
        window.currentTimeRange = null;

        const endTimeDefault = new Date();
        const startTimeDefault = new Date();
        startTimeDefault.setHours(startTimeDefault.getHours() - 1);
        $('#start-time').val(formatDateTimeLocal(startTimeDefault));
        $('#end-time').val(formatDateTimeLocal(endTimeDefault));


        $('#location-selector').on('change', function () {
            const selectedLocations = $(this).val();
            updateCharts(selectedLocations);
        });

        
        $('#apply-time-filter').on('click', function () {
            const startTimeVal = $('#start-time').val();
            const endTimeVal = $('#end-time').val();

            if (startTimeVal && endTimeVal) {
                window.currentTimeRange = {
                    start: new Date(startTimeVal).getTime(),
                    end: new Date(endTimeVal).getTime()
                };
            } else {
                window.currentTimeRange = null;
            }
            const selectedLocations = $('#location-selector').val();
            updateCharts(selectedLocations);
        });

        loadCharts(['all']);


        setTimeout(getFeed, 10000);
    });


    function formatDateTimeLocal(date) {
        return date.toISOString().slice(0, 16);
    }

    function loadCharts(selectedLocations) {
        $.ajax({
            url: '/dashboard/temp_data',
            dataType: 'json',
            success: function (data) {
                const filteredData = processData(data, selectedLocations, window.currentTimeRange);

                
                const commonChartConfig = {
                    viewType: "charts",
                    chart: {
                        type: "line",
                        yAxis: {title: {text: "Value"}},
                        xAxis: {title: {text: "Time"}},
                        categories: {display: false},
                        colorMapping: locationColorMap
                    }
                };

                
                const commonReportConfig = {
                    dataSource: {
                        type: "json",
                        data: filteredData,
                        mapping: {
                            loc: {caption: "Location", uniqueName: "loc"},
                            date_created: {caption: "Created Date", type: "datetime"}
                        }
                    },
                    slice: {
                        rows: [{uniqueName: "date_created"}],
                        columns: [{uniqueName: "loc"}],
                        measures: [{
                            uniqueName: "value",
                            format: "decimal",
                            aggregation: "average"
                        }]
                    },
                    formats: [{name: "decimal", decimalPlaces: 2}],
                    options: commonChartConfig
                };

                /* Temperature */
                if (!window.flexmonster1) {
                    const tempReport = JSON.parse(JSON.stringify(commonReportConfig));
                    tempReport.dataSource.mapping.temp = {caption: "Temperature", type: "number"};
                    tempReport.slice.measures[0].uniqueName = "temp";
                    tempReport.slice.measures[0].caption = "Temperature";
                    tempReport.options.chart.yAxis.title.text = "Temperature (°C)";
                    window.flexmonster1 = new Flexmonster({
                        container: "#pivot-container",
                        componentFolder: "https://cdn.flexmonster.com/",
                        toolbar: true,
                        report: tempReport
                    });
                } else {
                    window.flexmonster1.updateData({data: filteredData});
                }

                /* Humidity */
                if (!window.flexmonster2) {
                    const humReport = JSON.parse(JSON.stringify(commonReportConfig));
                    humReport.dataSource.mapping.hum = {caption: "Humidity", type: "number"};
                    humReport.slice.measures[0].uniqueName = "hum";
                    humReport.slice.measures[0].caption = "Humidity";
                    humReport.slice.measures[0].format = "percent";
                    humReport.options.chart.yAxis.title.text = "Humidity (%)";
                    window.flexmonster2 = new Flexmonster({
                        container: "#pivot-container1",
                        componentFolder: "https://cdn.flexmonster.com/",
                        toolbar: true,
                        report: humReport
                    });
                } else {
                    window.flexmonster2.updateData({data: filteredData});
                }

                /* Light */
                if (!window.flexmonster3) {
                    const lightReport = JSON.parse(JSON.stringify(commonReportConfig));
                    lightReport.dataSource.mapping.light = {caption: "Light", type: "number"};
                    lightReport.slice.measures[0].uniqueName = "light";
                    lightReport.slice.measures[0].caption = "Light";
                    lightReport.options.chart.yAxis.title.text = "Light Intensity";
                    window.flexmonster3 = new Flexmonster({
                        container: "#pivot-container2",
                        componentFolder: "https://cdn.flexmonster.com/",
                        toolbar: true,
                        report: lightReport
                    });
                } else {
                    window.flexmonster3.updateData({data: filteredData});
                }

                /* Sound */
                if (!window.flexmonster4) {
                    const soundReport = JSON.parse(JSON.stringify(commonReportConfig));
                    soundReport.dataSource.mapping.snd = {caption: "Sound", type: "number"};
                    soundReport.slice.measures[0].uniqueName = "snd";
                    soundReport.slice.measures[0].caption = "Sound";
                    soundReport.options.chart.yAxis.title.text = "Sound Level (dB)";
                    window.flexmonster4 = new Flexmonster({
                        container: "#pivot-container3",
                        componentFolder: "https://cdn.flexmonster.com/",
                        toolbar: true,
                        report: soundReport
                    });
                } else {
                    window.flexmonster4.updateData({data: filteredData});
                }
            }
        });
    }

    
    function updateCharts(selectedLocations) {
        loadCharts(selectedLocations);
    }

    
    function getFeed() {
        const selectedLocations = $('#location-selector').val();
        $.ajax({
            url: '/dashboard/temp_data',
            dataType: 'json',
            success: function (data) {
                const filteredData = processData(data, selectedLocations, window.currentTimeRange);
                if (window.flexmonster1) window.flexmonster1.updateData({data: filteredData});
                if (window.flexmonster2) window.flexmonster2.updateData({data: filteredData});
                if (window.flexmonster3) window.flexmonster3.updateData({data: filteredData});
                if (window.flexmonster4) window.flexmonster4.updateData({data: filteredData});
            },
            complete: function () {
                setTimeout(getFeed, 10000); // 10 秒轮询
            }
        });
    }
</script>
</body>
</html>
